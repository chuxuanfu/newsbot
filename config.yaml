    category_hint: local_news

  - name: abc7_bay_area
    type: rss
    url: https://abc7news.com/feed/
    interval_seconds: 600
    category_hint: local_news

  - name: nbc_bay_area
    type: rss
    url: https://www.nbcbayarea.com/?rss=y
    interval_seconds: 600
    category_hint: local_news

  - name: cbs_bay_area_local
    type: rss
    url: https://www.cbsnews.com/sanfrancisco/latest/rss/local-news
